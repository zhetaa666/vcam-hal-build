name: Build External Camera HAL (AIDL V1) v12.0 (32GB Swap + Extreme GC)

# ============================================================================
# Phase 10 - The Final Boss Edition (OOM Annihilation)
# - Memory: 32GB Disk Swap + 8GB RAM = 40GB Total (Aman karena disk sisa >40GB)
# - Storage: Pre-emptive wipe Git Objects & Surgical Strikes pada broken tests
# - Soong: Extreme Go GC (GOGC=5) -> Paksa bersihkan RAM setiap naik 5%
# - Threads: Single thread (GOMAXPROCS=1) untuk AST Parser, Dual untuk Clang
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      aosp_branch:
        description: 'AOSP branch (rec: android16-qpr2-release)'
        required: true
        default: 'android16-qpr2-release'
      build_variant:
        description: 'lunch target'
        required: true
        default: 'aosp_arm64-trunk_staging-userdebug'

jobs:
  build:
    name: HAL Builder Core
    runs-on: self-hosted
    timeout-minutes: 600

    env:
      TMPDIR: /mnt/aosp/tmpdir
      CCACHE_DIR: /mnt/aosp/.ccache
      CCACHE_EXEC: /usr/bin/ccache

    steps:
      # ---------- Step 1: Disk Space & Memory Architecture ----------
      - name: Architect Memory & Storage (32GB Extreme Swap)
        run: |
          echo "[ARCH] Membersihkan sisa environment sebelumnya & Pre-Cleaning Disk..."
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          
          sudo rm -rf /mnt/aosp/tmpdir
          sudo mkdir -p /mnt/aosp/tmpdir /mnt/aosp/.ccache
          
          # Hapus sampah Git lama di awal agar SSD lega (Mengamankan >40GB SSD untuk Swap)
          sudo rm -rf /mnt/aosp/.repo/project-objects || true
          sudo rm -rf /mnt/aosp/.repo/projects || true
          
          # Hapus cache 'Repo' root yang nyangkut di sistem OS
          sudo rm -f /etc/.repo_gitconfig.json || true
          sudo rm -f ~/.repo_gitconfig.json || true
          
          # Kembalikan hak akses environment agar user runner bisa menulis
          sudo chown -R $USER:$USER /mnt/aosp
          sudo chmod 1777 /mnt/aosp/tmpdir /mnt/aosp/.ccache
          
          echo "[ARCH] Konfigurasi 32GB Disk Swap (The Final Boss Weapon)..."
          sudo fallocate -l 32G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=32768
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

          echo "[ARCH] Tweak Kernel VM & Swappiness (Fokus ke Disk Swap)..."
          sudo sysctl vm.swappiness=100 || true
          sudo sysctl vm.watermark_scale_factor=500 || true
          sudo sysctl vm.vfs_cache_pressure=500 || true
          
          free -h
          df -h /mnt/aosp

      # ---------- Step 2: Setup Workspace & Repo ----------
      - name: Initialize Git & Repo
        run: |
          mkdir -p /mnt/aosp/bin /mnt/aosp/home
          echo "HOME=/mnt/aosp/home" >> $GITHUB_ENV
          echo "/mnt/aosp/bin" >> $GITHUB_PATH

          if [ ! -f /mnt/aosp/bin/repo ]; then
            curl -s https://storage.googleapis.com/git-repo-downloads/repo > /mnt/aosp/bin/repo
            chmod a+x /mnt/aosp/bin/repo
          fi

          HOME=/mnt/aosp/home git config --global user.email "santuyajah6@gmail.com"
          HOME=/mnt/aosp/home git config --global user.name "Santuyajah"
          # Disable delta compression memory spikes
          HOME=/mnt/aosp/home git config --global core.packedGitLimit 512m 
          HOME=/mnt/aosp/home git config --global pack.windowMemory 512m

      # ---------- Step 3: Minimalist Local Manifest ----------
      - name: Inject Local Manifest (Extreme Prune)
        working-directory: /mnt/aosp
        run: |
          /mnt/aosp/bin/repo init -u https://android.googlesource.com/platform/manifest \
            -b ${{ github.event.inputs.aosp_branch }} --depth=1 --no-tags --no-clone-bundle

          mkdir -p .repo/local_manifests
          cat > .repo/local_manifests/extreme_prune.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <!-- Drop all heavy components not needed for Camera HAL -->
            <remove-project name="platform/cts" optional="true"/>
            <remove-project name="platform/external/chromium-webview" optional="true"/>
            <remove-project name="platform/external/skia" optional="true"/>
            <remove-project name="platform/external/v8" optional="true"/>
            <remove-project name="platform/frameworks/base" optional="true"/>
            <remove-project name="platform/prebuilts/rust" optional="true"/>
            <remove-project name="platform/prebuilts/clang-darwin" optional="true"/>
          </manifest>
          EOF

      - name: Smart Repo Sync
        working-directory: /mnt/aosp
        run: |
          /mnt/aosp/bin/repo sync -c -j2 --force-sync --no-clone-bundle --no-tags --optimized-fetch || true

      # ---------- Step 4: Storage Reclaimer & Safe Scrubber ----------
      - name: Reclaim Disk Space & Safe Scrubber
        working-directory: /mnt/aosp
        run: |
          echo "[ARCH] Menghapus data Git (Project Objects) tahap akhir..."
          rm -rf .repo/project-objects
          rm -rf .repo/projects
          
          echo "[ARCH] Surgical Strike: Menghapus test folder bermasalah saja..."
          for d in \
            tools/security/fuzzing/orphans/libskia \
            packages/modules/Connectivity/tests \
            frameworks/native/services/surfaceflinger/tests \
            frameworks/compile/mclinker \
            frameworks/compile/slang \
            frameworks/compile/libbcc \
            trusty ; do
            if [ -d "$d" ]; then
              rm -rf "$d" && echo "  Terhapus aman: $d"
            fi
          done

          # Disable folder DeviceAsWebcam yang memicu error sebelumnya
          if [ -f "packages/services/DeviceAsWebcam/Android.bp" ]; then
            mv packages/services/DeviceAsWebcam/Android.bp packages/services/DeviceAsWebcam/Android.bp.disabled
            echo "  Disabled: DeviceAsWebcam"
          fi

          df -h /

      # ---------- Step 5: CCache Configuration ----------
      - name: Configure CCache
        working-directory: /mnt/aosp
        run: |
          ccache -M 15G
          ccache -s

      # ---------- Step 6: Compilation (Extreme Soong Tweak) ----------
      - name: Build External Camera HAL
        working-directory: /mnt/aosp
        run: |
          set -e
          set -o pipefail
          source build/envsetup.sh
          lunch ${{ github.event.inputs.build_variant }}
          
          # Matikan Bazel untuk hemat RAM 4GB
          export SOONG_NO_BAZEL=true
          export BUILD_BROKEN_DISABLE_BAZEL=true
          export USE_RBE=false
          
          # ========================================================
          # GOGC=5 : Memaksa Go-lang membersihkan sampah memori 
          # setiap kali memori terpakai naik 5%. Ini membuat parser
          # berjalan agak lambat, tapi 100% KEBAS DARI OOM.
          # ========================================================
          export GOGC=5
          export GOMEMLIMIT=4096MiB
          export GOMAXPROCS=1 
          export ALLOW_MISSING_DEPENDENCIES=true
          
          echo "[ARCH] Memulai kompilasi dengan 32GB Swap & Agresif GC"
          # Cukup gunakan -j2 saat memanggil Clang
          m -j2 \
            android.hardware.camera.provider-V1-external-service \
            android.hardware.camera.provider-V1-external-impl \
            camera.device-external-impl 2>&1 | tee /mnt/aosp/build.log

      # ---------- Step 7: Export Artifacts ----------
      - name: Collect Output
        if: always()
        working-directory: /mnt/aosp
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts
          find out -type f -name "android.hardware.camera.provider-V1-external-service" -exec cp {} $GITHUB_WORKSPACE/artifacts/ \; || true
          find out -type f -name "*.so" | grep "external-impl" -exec cp {} $GITHUB_WORKSPACE/artifacts/ \; || true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Camera-HAL-Outputs
          path: artifacts/
          retention-days: 7
