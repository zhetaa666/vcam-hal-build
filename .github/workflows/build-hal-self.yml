name: Build External Camera HAL (AIDL V1) v10.5 Self-Hosted Resumable

# ============================================================================
# Phase 4A v10.5 - VCam Project (Santuyajah) - SELF-HOSTED VPS 160GB
#
# DIFF vs v10.4:
#   v10.4 masih kepotong llvm-project & test/app_compat/csuite -> bikin
#   error parse soong:
#     - "llvm_tblgen" unrecognized -> di-define oleh external/llvm-project
#         bootstrap_go_package
#     - "csuite_test" unrecognized -> di-define oleh test/app_compat/csuite
#   Error ini PARSE-TIME, ALLOW_MISSING_DEPENDENCIES=true gak bisa nolong.
#
# Strategi v10.5 - MINIMAL PRUNE EKSTREM:
#   Hanya buang yang BENAR-BENAR gak mungkin dipakai dan PALING BESAR.
#   Hampir semua test infrastructure & toolchain DIPERTAHANKAN supaya
#   module types & defaults bisa di-resolve oleh soong.
#
#   PRUNE LIST (final):
#     - prebuilts/abi-dumps             (~10-20GB, hanya untuk ABI check)
#     - prebuilts/clang-darwin          (kita Linux)
#     - prebuilts/build-tools-darwin    (kita Linux)
#     - prebuilts/python-darwin         (kita Linux)
#     - prebuilts/go/darwin-x86         (kita Linux)
#     - prebuilts/fuchsia_sdk           (gak relevan camera)
#     - prebuilts/qemu-kernel           (gak buat emulator image)
#     - external/chromium-webview       (puluhan GB, gak relevan)
#     - external/chromium-libpac        (gak relevan)
#     - external/cronet                 (gak relevan)
#     - external/v8 + prebuilts/v8      (gak relevan)
#     - external/swift                  (gak relevan)
#     - external/dart                   (gak relevan)
#     - external/tensorflow             (gak relevan, GB-an)
#     - external/perfetto               (tracing, GB-an)
#     - cts (platform/cts)              (test suite besar)
#     - packages/apps/Chrome, Browser2, Music (gak relevan)
#
#   KEEP (vs v10.4 yang kita prune):
#     + external/llvm-project           -> defines llvm_tblgen module type
#     + external/llvm                   -> chained
#     + external/clang                  -> chained
#     + test/app_compat                 -> defines csuite_test module type
#     + test/suite_harness              -> tradefed dependencies
#     + frameworks/rs                   -> RS chain
#     + prebuilts/rust                  -> rust defaults
#     + packages/modules/Connectivity   -> Tethering apex defaults
#     + external/skia                   -> skia_deps
#     + semua test/ folder              -> module_types
#
#   Build trick (sama dengan v10.4):
#     ALLOW_MISSING_DEPENDENCIES=true + m -k
#
# Inputs:
#   - force_resync: paksa repo sync ulang
#   - force_clean_out: hapus out/ sebelum build
#   - reset_state: HAPUS .state dir + tidak hapus source. Untuk recovery.
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      aosp_branch:
        description: 'AOSP branch (rec: android16-qpr2-release)'
        required: true
        default: 'android16-qpr2-release'
      build_variant:
        description: 'lunch target'
        required: true
        default: 'aosp_arm64-trunk_staging-userdebug'
      force_resync:
        description: 'Paksa repo sync ulang (true/false)'
        required: false
        default: 'false'
      force_clean_out:
        description: 'Hapus out/ sebelum build (true/false)'
        required: false
        default: 'false'
      reset_state:
        description: 'Reset state markers untuk re-evaluate workspace (true/false)'
        required: false
        default: 'false'

jobs:
  build:
    name: Build External Camera HAL (Self-Hosted v10.5, Resumable, Minimal Prune)
    runs-on: self-hosted
    timeout-minutes: 1200

    env:
      AOSP_ROOT: /mnt/aosp
      STATE_DIR: /mnt/aosp/.state
      CCACHE_DIR: /mnt/aosp/.ccache
      CCACHE_SIZE: 15G
      TMPDIR: /mnt/aosp/tmpdir
      TMP: /mnt/aosp/tmpdir
      TEMP: /mnt/aosp/tmpdir

    steps:
      - name: Show runner & disk info
        run: |
          echo "=== Hostname / User ==="; hostname; whoami
          echo "=== Disk ==="; df -h
          echo "=== Memory ==="; free -h
          echo "=== CPU cores ==="; nproc
          echo "=== State dir (sentinel) ==="
          ls -la ${STATE_DIR} 2>/dev/null || echo "(belum ada, first run)"
          echo "=== ccache ==="
          which ccache && ccache -s 2>/dev/null | head -10 || echo "ccache belum terinstall"

      - name: Prepare persistent directories
        run: |
          sudo mkdir -p \
            ${AOSP_ROOT} \
            ${AOSP_ROOT}/tmpdir \
            ${AOSP_ROOT}/.ccache \
            ${AOSP_ROOT}/.state \
            ${AOSP_ROOT}/logs \
            ${AOSP_ROOT}/bin \
            ${AOSP_ROOT}/home
          sudo chown -R $USER:$USER ${AOSP_ROOT}
          chmod 1777 ${AOSP_ROOT}/tmpdir
          ls -la ${AOSP_ROOT}

      - name: Reset state markers (optional)
        if: ${{ github.event.inputs.reset_state == 'true' }}
        run: |
          echo "reset_state=true -> hapus semua sentinel di ${STATE_DIR}"
          rm -f ${STATE_DIR}/*.done
          ls -la ${STATE_DIR} || true

      - name: Install AOSP build deps (cached)
        run: |
          if [ -f ${STATE_DIR}/deps.done ]; then
            echo "Deps sudah terinstall. Skip."
            exit 0
          fi
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            libc6-dev-i386 libncurses-dev x11proto-core-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
            fontconfig openjdk-17-jdk python3 python3-pip ccache rsync \
            libssl-dev bc cpio kmod
          touch ${STATE_DIR}/deps.done

      - name: Setup repo tool & git config
        run: |
          if [ ! -f ${AOSP_ROOT}/bin/repo ]; then
            curl -s https://storage.googleapis.com/git-repo-downloads/repo > ${AOSP_ROOT}/bin/repo
            chmod a+x ${AOSP_ROOT}/bin/repo
          fi
          echo "${AOSP_ROOT}/bin" >> $GITHUB_PATH
          echo "HOME=${AOSP_ROOT}/home" >> $GITHUB_ENV
          HOME=${AOSP_ROOT}/home git config --global user.email "santuyajah6@gmail.com"
          HOME=${AOSP_ROOT}/home git config --global user.name "Santuyajah"
          HOME=${AOSP_ROOT}/home git config --global color.ui false
          HOME=${AOSP_ROOT}/home git config --global pack.threads 4

      - name: Repo init (skip if same branch)
        working-directory: /mnt/aosp
        run: |
          BRANCH="${{ github.event.inputs.aosp_branch }}"
          INIT_MARKER="${STATE_DIR}/repo_init_${BRANCH}.done"
          if [ -f "$INIT_MARKER" ] && [ -d .repo ]; then
            echo "Repo sudah init untuk '$BRANCH'. Skip."
          else
            rm -f ${STATE_DIR}/repo_init_*.done
            ${AOSP_ROOT}/bin/repo init \
              -u https://android.googlesource.com/platform/manifest \
              -b "$BRANCH" \
              --depth=1 --no-tags --no-clone-bundle
            touch "$INIT_MARKER"
            rm -f ${STATE_DIR}/repo_sync_*.done
          fi

      # ====================================================================
      # Step: Local manifest - MINIMAL PRUNE EKSTREM (v10.5)
      # ====================================================================
      # KEEP llvm-project, test/app_compat (csuite_test), test/suite_harness,
      # frameworks/rs, prebuilts/rust, Connectivity, skia, dst.
      - name: Apply minimal prune local manifest (v10.5)
        working-directory: /mnt/aosp
        run: |
          mkdir -p .repo/local_manifests

          cat > .repo/local_manifests/skip_safe.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <!-- ===== TIER A: Test suite cts saja (besar, ~30-50GB) ===== -->
            <!-- KEEP test/cts-root, test/mts, test/vts, test/app_compat,
                 test/suite_harness, test/dittosuite, test/graphics karena
                 mereka define module types yg dipakai modul lain -->
            <remove-project name="platform/cts" optional="true"/>

            <!-- ===== TIER B: Browser & web (puluhan GB, gak relevan) ===== -->
            <remove-project name="platform/external/chromium-webview" optional="true"/>
            <remove-project name="platform/external/chromium-libpac" optional="true"/>
            <remove-project name="platform/external/cronet" optional="true"/>
            <remove-project name="platform/external/v8" optional="true"/>
            <remove-project name="platform/prebuilts/v8" optional="true"/>

            <!-- ===== TIER C: ABI dumps (~10-20GB, hanya untuk ABI check) ===== -->
            <remove-project name="platform/prebuilts/abi-dumps" optional="true"/>
            <remove-project name="platform/prebuilts/abi-dumps/ndk" optional="true"/>
            <remove-project name="platform/prebuilts/abi-dumps/platform" optional="true"/>
            <remove-project name="platform/prebuilts/abi-dumps/vndk" optional="true"/>

            <!-- ===== TIER D: Darwin only (kita Linux) ===== -->
            <remove-project name="platform/prebuilts/clang-darwin" optional="true"/>
            <remove-project name="platform/prebuilts/build-tools-darwin" optional="true"/>
            <remove-project name="platform/prebuilts/python-darwin" optional="true"/>
            <remove-project name="platform/prebuilts/go/darwin-x86" optional="true"/>

            <!-- ===== TIER E: Embedded SDK (gak relevan) ===== -->
            <remove-project name="platform/prebuilts/fuchsia_sdk" optional="true"/>
            <remove-project name="platform/prebuilts/qemu-kernel" optional="true"/>

            <!-- ===== TIER F: Alt langs (gak relevan camera HAL) ===== -->
            <remove-project name="platform/external/swift" optional="true"/>
            <remove-project name="platform/external/dart" optional="true"/>

            <!-- ===== TIER G: ML/tracing (GB-an, gak relevan camera) ===== -->
            <remove-project name="platform/external/tensorflow" optional="true"/>
            <remove-project name="platform/external/perfetto" optional="true"/>

            <!-- ===== TIER H: Apps tidak relevan ===== -->
            <remove-project name="platform/packages/apps/Chrome" optional="true"/>
            <remove-project name="platform/packages/apps/Browser2" optional="true"/>
            <remove-project name="platform/packages/apps/Music" optional="true"/>

            <!-- ===== TIER I: Maven darwin only ===== -->
            <remove-project name="platform/prebuilts/maven_repo/bumblebee" optional="true"/>

            <!-- ====================================================== -->
            <!-- KEEP yang sebelumnya kita prune di v10.4:               -->
            <!--   external/llvm-project    -> llvm_tblgen module type   -->
            <!--   external/llvm            -> chained                   -->
            <!--   external/clang           -> chained                   -->
            <!--   external/lldb-llvm       -> chained                   -->
            <!--   external/skqp            -> bisa di-keep, kecil       -->
            <!--   external/grpc-grpc-java  -> chained                   -->
            <!--   test/cts-root, mts, vts, app_compat, suite_harness    -->
            <!--   test/dittosuite, graphics                              -->
            <!--   developers/, docs/                                     -->
            <!-- ====================================================== -->
          </manifest>
          EOF

          echo "Manifest v10.5 ditulis - MINIMAL PRUNE (KEEP llvm/test/etc)"
          echo "(Jika hash berubah, sync biasa akan handle perubahan tanpa full re-sync)"

      - name: Repo sync (resumable + auto-resume)
        working-directory: /mnt/aosp
        run: |
          BRANCH="${{ github.event.inputs.aosp_branch }}"
          SYNC_MARKER="${STATE_DIR}/repo_sync_${BRANCH}.done"
          FORCE="${{ github.event.inputs.force_resync }}"

          if [ "$FORCE" = "true" ]; then
            echo "force_resync=true -> hapus marker."
            rm -f "$SYNC_MARKER"
          fi

          # Auto-detect: kalau .repo/projects/ punya banyak project tapi
          # marker tidak ada (run sebelumnya cancelled di Finalizing),
          # treat sebagai light-sync.
          PROJECT_COUNT=0
          if [ -d .repo/projects ]; then
            PROJECT_COUNT=$(find .repo/projects -mindepth 1 -maxdepth 6 -name "*.git" -type d 2>/dev/null | wc -l)
          fi
          echo "Detected $PROJECT_COUNT project repos di .repo/projects/"

          if [ ! -f "$SYNC_MARKER" ] && [ "$PROJECT_COUNT" -gt 50 ]; then
            echo "AUTO-RESUME: Sudah ada $PROJECT_COUNT project. Treat sebagai light-sync."
            touch "$SYNC_MARKER"
          fi

          if [ -f "$SYNC_MARKER" ]; then
            echo "Light-sync incremental..."
            ${AOSP_ROOT}/bin/repo sync \
              -c -j$(nproc) --no-clone-bundle --no-tags --optimized-fetch \
              --fail-fast || {
                echo "Light sync gagal. Fallback force-sync..."
                ${AOSP_ROOT}/bin/repo sync \
                  -c -j$(nproc) --force-sync --no-clone-bundle \
                  --no-tags --optimized-fetch --fail-fast
              }
            touch "$SYNC_MARKER"
          else
            echo "First-time sync penuh untuk '$BRANCH'..."
            for i in 1 2 3; do
              echo "===== Attempt $i/3 ====="
              ${AOSP_ROOT}/bin/repo sync \
                -c -j$(nproc) --force-sync --no-clone-bundle \
                --no-tags --optimized-fetch --fail-fast && {
                  touch "$SYNC_MARKER"
                  echo "Sync sukses di attempt $i."
                  break
                }
              echo "Sync gagal, tunggu 60s..."
              sleep 60
            done
            if [ ! -f "$SYNC_MARKER" ]; then
              echo "Sync gagal setelah 3 attempts."
              exit 1
            fi
          fi
          df -h ${AOSP_ROOT}

      # ====================================================================
      # Step: Cleanup leftover folder yang sekarang di-prune via manifest
      # tapi sebelumnya pernah ke-sync (untuk pengguna yg upgrade dari v10.4).
      # PENTING: di v10.5 kita SUDAH KEEP llvm-project, test/app_compat,
      # dll - jadi list cleanup lebih pendek.
      # ====================================================================
      - name: Cleanup folder yang di-prune di v10.5
        working-directory: /mnt/aosp
        run: |
          # Folder yang di-prune via manifest v10.5
          for d in \
            cts \
            external/chromium-webview \
            external/chromium-libpac \
            external/cronet \
            external/v8 \
            external/swift \
            external/dart \
            external/tensorflow \
            external/perfetto \
            prebuilts/abi-dumps \
            prebuilts/v8 \
            prebuilts/fuchsia_sdk \
            prebuilts/qemu-kernel \
            prebuilts/clang-darwin \
            prebuilts/build-tools-darwin \
            prebuilts/python-darwin \
            prebuilts/maven_repo/bumblebee \
            packages/apps/Chrome \
            packages/apps/Browser2 \
            packages/apps/Music ; do
            if [ -e "$d" ]; then
              SIZE=$(du -sh "$d" 2>/dev/null | cut -f1)
              rm -rf "$d" && echo "Removed $d (was $SIZE)"
            fi
          done
          echo ""
          df -h ${AOSP_ROOT}

      # ====================================================================
      # Step: Restore Android.bp.disabled dari run sebelumnya
      # ====================================================================
      # Run-run v10.x sebelumnya pakai scrubber yang men-disable Android.bp.
      # Di v10.5 kita full source, jadi semua Android.bp.disabled HARUS
      # di-restore supaya soong bisa parse dengan lengkap.
      - name: Restore semua Android.bp.disabled dari run sebelumnya
        working-directory: /mnt/aosp
        run: |
          COUNT=0
          while IFS= read -r f; do
            # Path yg sekarang di-prune total via manifest -> file ini sudah
            # gak ada parent folder-nya, skip
            if [ ! -d "$(dirname "$f")" ]; then continue; fi
            ORIG="${f%.disabled}"
            mv "$f" "$ORIG" && COUNT=$((COUNT+1))
          done < <(find . -name "Android.bp.disabled" -not -path "./.repo/*" 2>/dev/null)
          echo "Restored $COUNT Android.bp.disabled"

      # ====================================================================
      # Step: Bootstrap probe + auto-disable parse-fail Android.bp
      # ====================================================================
      # Strategi v10.5: jalanin 'm nothing' sekali. Kalau ada parse error
      # (module type unknown, defaults missing yg PARSE-time), auto-disable
      # Android.bp file YANG SPESIFIK error itu. Iterate sampai bersih.
      # Tidak hardcode pattern - cuma reaktif terhadap error real.
      - name: Bootstrap probe + targeted auto-disable
        working-directory: /mnt/aosp
        run: |
          source build/envsetup.sh
          lunch ${{ github.event.inputs.build_variant }}
          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          ccache -M ${CCACHE_SIZE} 2>/dev/null || true
          export ALLOW_MISSING_DEPENDENCIES=true

          # Yang di-protect = jangan pernah disable
          PROTECT_REGEX='hardware/interfaces/camera/(provider|device|common)/(default|[0-9])|hardware/libhardware/include/hardware/camera|frameworks/native/libs/(renderengine|gui|ui|nativewindow|sync)/Android\.bp$|frameworks/native/services/surfaceflinger/Android\.bp$|frameworks/av/camera/Android\.bp$'

          mkdir -p ${AOSP_ROOT}/logs
          MAX_ITER=8
          for iter in $(seq 1 $MAX_ITER); do
            echo ""
            echo ">>>>> Bootstrap probe iteration $iter / $MAX_ITER <<<<<"
            ERR_LOG=${AOSP_ROOT}/logs/probe_${iter}.log

            # Hanya jalanin tahap soong bootstrap (m nothing). Kalau pass,
            # build penuh nanti di Step Build.
            timeout 1200 m nothing 2>&1 | tee "$ERR_LOG" > /dev/null
            RC=${PIPESTATUS[0]}

            # Cari Android.bp yg parse-fail
            BAD_BP=$(grep -oE 'error:\s+([a-zA-Z0-9_/.-]+/Android\.bp):' "$ERR_LOG" \
                     | sed -E 's/error:\s+//;s/:$//' | sort -u || true)

            if [ -z "$BAD_BP" ]; then
              if [ "$RC" -eq 0 ]; then
                echo "Bootstrap PASS - no Android.bp errors. Lanjut build."
                break
              else
                echo "Bootstrap fail dengan rc=$RC tapi tidak ada error Android.bp."
                echo "Tail log:"
                tail -60 "$ERR_LOG"
                break
              fi
            fi

            BP_COUNT=0
            PROTECTED_HIT=0
            for bp in $BAD_BP; do
              [ ! -f "$bp" ] && continue
              if echo "$bp" | grep -qE "$PROTECT_REGEX"; then
                echo "  PROTECTED (refuse): $bp"
                PROTECTED_HIT=1
                continue
              fi
              echo "  Disabling: $bp"
              mv "$bp" "${bp}.disabled"
              BP_COUNT=$((BP_COUNT+1))
            done
            echo "Iteration $iter: disabled $BP_COUNT Android.bp"

            if [ "$BP_COUNT" -eq 0 ]; then
              if [ "$PROTECTED_HIT" -eq 1 ]; then
                echo "Hanya protected Android.bp yg masih error. STOP scrubber."
              fi
              break
            fi
          done

          echo ""
          echo "=== Total Android.bp.disabled saat ini ==="
          find . -name "Android.bp.disabled" -not -path "./.repo/*" 2>/dev/null | wc -l
          echo ""
          echo "=== Sanity: camera HAL Android.bp ada ==="
          ls hardware/interfaces/camera/provider/default/Android.bp 2>/dev/null && echo "  OK provider" || echo "  MISSING provider"
          ls hardware/interfaces/camera/device/default/Android.bp 2>/dev/null && echo "  OK device" || echo "  MISSING device"

      - name: Verify external camera HAL source
        working-directory: /mnt/aosp
        run: |
          MISSING=0
          for f in \
            hardware/interfaces/camera/provider/default/ExternalCameraProvider.cpp \
            hardware/interfaces/camera/device/default/ExternalCameraDevice.cpp ; do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
              MISSING=1
            fi
          done
          [ $MISSING -ne 0 ] && { echo "FATAL: source camera HAL hilang. Coba force_resync=true"; exit 1; } || true

      - name: Build external camera HAL (incremental + ccache)
        working-directory: /mnt/aosp
        run: |
          set -e
          set -o pipefail

          if [ "${{ github.event.inputs.force_clean_out }}" = "true" ]; then
            echo "force_clean_out=true -> hapus out/"
            rm -rf out
          fi

          source build/envsetup.sh
          lunch ${{ github.event.inputs.build_variant }}

          export USE_CCACHE=1
          export CCACHE_EXEC=$(which ccache)
          ccache -M ${CCACHE_SIZE}
          ccache -z 2>/dev/null || true

          export ALLOW_MISSING_DEPENDENCIES=true
          export TARGET_BUILD_UNBUNDLED=true

          echo "=== Disk before build ==="; df -h ${AOSP_ROOT}
          echo "=== ccache stats before ==="; ccache -s 2>/dev/null | head -20 || true

          m -j$(nproc) -k \
            android.hardware.camera.provider-V1-external-service \
            android.hardware.camera.provider-V1-external-impl \
            camera.device-external-impl \
            2>&1 | tee ${AOSP_ROOT}/build.log

          echo "=== Disk after build ==="; df -h ${AOSP_ROOT}
          echo "=== ccache stats after ==="; ccache -s 2>/dev/null | head -20 || true

      - name: Collect artifacts
        working-directory: /mnt/aosp
        run: |
          rm -rf $GITHUB_WORKSPACE/artifacts
          mkdir -p $GITHUB_WORKSPACE/artifacts/vendor/bin/hw
          mkdir -p $GITHUB_WORKSPACE/artifacts/vendor/lib64/hw
          mkdir -p $GITHUB_WORKSPACE/artifacts/vendor/etc/init
          mkdir -p $GITHUB_WORKSPACE/artifacts/source_reference

          find out -type f -name "android.hardware.camera.provider-V1-external-service" \
            -not -path "*/symbols/*" -not -path "*/unstripped/*" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/vendor/bin/hw/ \;
          find out -type f -name "android.hardware.camera.provider-V1-external-impl.so" \
            -not -path "*/symbols/*" -not -path "*/unstripped/*" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/vendor/lib64/hw/ \;
          find out -type f -name "camera.device-external-impl.so" \
            -not -path "*/symbols/*" -not -path "*/unstripped/*" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/vendor/lib64/hw/ \;
          find out -type f -name "android.hardware.camera.provider-V1-external-service*.rc" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/vendor/etc/init/ \; 2>/dev/null || true

          cp -v hardware/interfaces/camera/provider/default/Android.bp \
            $GITHUB_WORKSPACE/artifacts/source_reference/provider_Android.bp 2>/dev/null || true
          cp -v hardware/interfaces/camera/device/default/Android.bp \
            $GITHUB_WORKSPACE/artifacts/source_reference/device_Android.bp 2>/dev/null || true
          cp -v hardware/interfaces/camera/provider/default/*.rc \
            $GITHUB_WORKSPACE/artifacts/source_reference/ 2>/dev/null || true
          find . -type f \( -name "hal_camera*.te" -o -name "*camera_external*.te" \) \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/source_reference/ \; 2>/dev/null || true
          find . -type f -name "*camera*external*manifest*.xml" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/source_reference/ \; 2>/dev/null || true

      - name: Show final artifacts
        run: |
          find $GITHUB_WORKSPACE/artifacts -type f -exec ls -la {} \; 2>/dev/null || true
          du -sh $GITHUB_WORKSPACE/artifacts/ 2>/dev/null || true

      - name: Upload HAL artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: external-camera-hal-arm64
          path: artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /mnt/aosp/build.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload bootstrap diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-logs
          path: /mnt/aosp/logs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Cleanup runner workspace only
        if: always()
        run: |
          rm -rf $GITHUB_WORKSPACE/artifacts || true
          echo "Workspace runner dibersihkan. /mnt/aosp tetap utuh."
