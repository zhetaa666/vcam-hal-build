name: Build External Camera HAL (AIDL V1) v10.4 (Self-Hosted + Anti-OOM Tweaks)

# ============================================================================
# Phase 8 - Self Hosted VPS Edition (Sisa Disk 40GB)
# - Swap Memory 24GB (Aman untuk sisa SSD)
# - Preemptive nuke untuk LLVM, Skia, dan Trusty (Rust deps)
# - CCache aktif untuk resume build lebih cepat
# - Soong Memory Tweaks (GOGC, GOMEMLIMIT, GOMAXPROCS) agar tidak KILLED
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      aosp_branch:
        description: 'AOSP branch (rec: android16-qpr2-release)'
        required: true
        default: 'android16-qpr2-release'
      build_variant:
        description: 'lunch target'
        required: true
        default: 'aosp_arm64-trunk_staging-userdebug'

jobs:
  build:
    name: Build External Camera HAL (Self-Hosted)
    runs-on: self-hosted
    timeout-minutes: 600

    env:
      TMPDIR: /mnt/aosp/tmpdir
      TMP: /mnt/aosp/tmpdir
      TEMP: /mnt/aosp/tmpdir
      CCACHE_DIR: /mnt/aosp/.ccache
      CCACHE_EXEC: /usr/bin/ccache

    steps:
      # ---------- Step 1: Penyiapan Direktori Aman ----------
      - name: Setup Working Directories
        run: |
          sudo mkdir -p /mnt/aosp/tmpdir /mnt/aosp/vartmp /mnt/aosp/.ccache
          sudo chmod 1777 /mnt/aosp/tmpdir /mnt/aosp/vartmp /mnt/aosp/.ccache
          sudo chown -R $USER:$USER /mnt/aosp
          df -h /mnt/aosp

      # ---------- Step 1b: SETUP SWAP MEMORY (24GB - Aman untuk sisa disk 40GB) ----------
      - name: Setup 24GB Swap Space
        run: |
          echo "Mematikan swap lama jika ada..."
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          
          echo "Membuat file swap 24GB yang aman untuk disk..."
          sudo fallocate -l 24G /swapfile || sudo dd if=/dev/zero of=/swapfile bs=1M count=24576
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          
          echo "Swap 24GB berhasil diaktifkan!"
          free -h

      # ---------- Step 2: Setup HOME & repo tool ----------
      - name: Setup HOME & repo tool
        run: |
          mkdir -p /mnt/aosp/home
          echo "HOME=/mnt/aosp/home" >> $GITHUB_ENV

          mkdir -p /mnt/aosp/bin
          if [ ! -f /mnt/aosp/bin/repo ]; then
            curl -s https://storage.googleapis.com/git-repo-downloads/repo > /mnt/aosp/bin/repo
            chmod a+x /mnt/aosp/bin/repo
          fi
          echo "/mnt/aosp/bin" >> $GITHUB_PATH

          HOME=/mnt/aosp/home git config --global user.email "santuyajah6@gmail.com"
          HOME=/mnt/aosp/home git config --global user.name "Santuyajah"
          HOME=/mnt/aosp/home git config --global color.ui false
          HOME=/mnt/aosp/home git config --global pack.threads 4

      # ---------- Step 3: Repo init & Sinkronisasi Incremental ----------
      - name: Repo init & Local Manifest
        working-directory: /mnt/aosp
        run: |
          /mnt/aosp/bin/repo init \
            -u https://android.googlesource.com/platform/manifest \
            -b ${{ github.event.inputs.aosp_branch }} \
            --depth=1 --no-tags --no-clone-bundle

          # Setup Aggressive Prune
          mkdir -p .repo/local_manifests
          cat > .repo/local_manifests/skip_safe.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <remove-project name="platform/cts" optional="true"/>
            <remove-project name="platform/test/cts-root" optional="true"/>
            <remove-project name="platform/test/mts" optional="true"/>
            <remove-project name="platform/test/vts" optional="true"/>
            <remove-project name="platform/external/llvm-project" optional="true"/>
            <remove-project name="platform/external/llvm" optional="true"/>
            <remove-project name="platform/external/clang" optional="true"/>
            <remove-project name="platform/prebuilts/rust" optional="true"/>
            <remove-project name="platform/prebuilts/v8" optional="true"/>
            <remove-project name="platform/external/v8" optional="true"/>
            <remove-project name="platform/external/chromium-webview" optional="true"/>
            <remove-project name="platform/prebuilts/clang-darwin" optional="true"/>
            <remove-project name="platform/prebuilts/kernel/x86_64" optional="true"/>
            <remove-project name="platform/prebuilts/kernel/arm64" optional="true"/>
            <remove-project name="platform/external/skia" optional="true"/>
            <remove-project name="platform/external/skqp" optional="true"/>
            <remove-project name="platform/frameworks/compile/mclinker" optional="true"/>
            <remove-project name="platform/frameworks/compile/slang" optional="true"/>
            <remove-project name="platform/frameworks/compile/libbcc" optional="true"/>
            <remove-project name="platform/frameworks/rs" optional="true"/>
          </manifest>
          EOF

      - name: Repo sync (Smart Sync)
        working-directory: /mnt/aosp
        run: |
          /mnt/aosp/bin/repo sync -c -j4 --force-sync --no-clone-bundle --no-tags --optimized-fetch || true

      # ---------- Step 4: Preemptive Nuke & Scrubber Filtered ----------
      - name: Preemptive nuke test folders (Menangani Error Soong)
        working-directory: /mnt/aosp
        run: |
          echo "Nuke folder bermasalah yang menahan dependensi skia_deps, llvm_tblgen, dan trusty..."
          for d in \
            tools/security/fuzzing/orphans/libskia \
            tools/platform-compat/java/android/compat/testing \
            packages/modules/Connectivity/bpf/tests \
            packages/modules/Connectivity/tests \
            packages/modules/NetworkStack/tests \
            frameworks/native/services/surfaceflinger/tests \
            frameworks/compile/mclinker \
            frameworks/compile/slang \
            frameworks/compile/libbcc \
            frameworks/rs \
            trusty ; do
            if [ -d "$d" ]; then
              rm -rf "$d" && echo "  RM: $d"
            fi
          done

      - name: Iterative broken-bp scrubber STRICT
        working-directory: /mnt/aosp
        run: |
          TEST_PATH_REGEX='/tests?/|/vts/|/mts/|/cts/|/sts/|/benchmarks?/|/fuzz(er)?s?/|/perftests?/|/testing/'

          is_test_path() { echo "$1" | grep -qE "$TEST_PATH_REGEX"; }
          is_protected() { echo "$1" | grep -qE 'hardware/interfaces/camera/|frameworks/native/libs/'; }

          PATTERNS='"cts_defaults"|"mts_defaults"|"vts_defaults"|"sts_defaults"|"framework-connectivity-test-defaults"|"framework-connectivity-internal-test-defaults"|"connectivity-mainline-presubmit-cc-defaults"'

          BROKEN_FILES=$(grep -rlE "$PATTERNS" --include="Android.bp" --exclude-dir=".repo" . 2>/dev/null || true)

          for f in $BROKEN_FILES; do
            if is_protected "$f"; then continue; fi
            if is_test_path "$f"; then
              mv "$f" "${f}.disabled"
            fi
          done

      # ---------- Step 5: Caching & Kompilasi ----------
      - name: Configure CCache
        working-directory: /mnt/aosp
        run: |
          ccache -M 25G
          ccache -s

      - name: Build external camera HAL
        working-directory: /mnt/aosp
        run: |
          set -e
          set -o pipefail
          source build/envsetup.sh
          lunch ${{ github.event.inputs.build_variant }}
          
          export USE_CCACHE=1
          export CCACHE_EXEC=/usr/bin/ccache
          export ALLOW_MISSING_DEPENDENCIES=true
          
          # ==========================================
          # ANTI-OOM SOONG TWEAKS (WAJIB UNTUK RAM 8GB)
          # ==========================================
          # 1. Paksa sistem membuang "sampah" memori lebih cepat
          export GOGC=20 
          # 2. Batasi pemakaian memori murni Soong maksimal ~6GB
          export GOMEMLIMIT=6144MiB 
          # 3. Batasi CPU agar proses pembacaan file tidak terjadi serentak
          export GOMAXPROCS=2

          m -j$(nproc) \
            android.hardware.camera.provider-V1-external-service \
            android.hardware.camera.provider-V1-external-impl \
            camera.device-external-impl 2>&1 | tee /mnt/aosp/build.log

      # ---------- Step 6: Collect and Upload Artifacts ----------
      - name: Collect artifacts
        working-directory: /mnt/aosp
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts/vendor/bin/hw
          mkdir -p $GITHUB_WORKSPACE/artifacts/vendor/lib64/hw

          find out -type f -name "android.hardware.camera.provider-V1-external-service" \
            -not -path "*/symbols/*" -not -path "*/unstripped/*" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/vendor/bin/hw/ \;
          find out -type f -name "android.hardware.camera.provider-V1-external-impl.so" \
            -not -path "*/symbols/*" -not -path "*/unstripped/*" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/vendor/lib64/hw/ \;
          find out -type f -name "camera.device-external-impl.so" \
            -not -path "*/symbols/*" -not -path "*/unstripped/*" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/vendor/lib64/hw/ \;

      - name: Upload HAL artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: external-camera-hal-arm64
          path: artifacts/
          retention-days: 30
          if-no-files-found: error
