name: Build External Camera HAL (AIDL V1) — v9.7

# ============================================================================
# Phase 4A v9.7 — VCam Project (Santuyajah)
# Target: android.hardware.camera.provider-V1-external-service (arm64)
#
# Perubahan v9.7 vs v9.6:
#   - v9.6 lulus prune llvm_tblgen tapi gagal di soong bootstrap dengan
#     5+ error reference broken: cts_defaults, mts-target-sdk-version-current.
#   - Pola: setiap kita prune project test, ada Android.bp di module lain
#     yang reference simbol yang hilang. Whack-a-mole game tidak akan selesai.
#   - Solusi v9.7: tambah Step 8a yang scan SEMUA Android.bp untuk reference
#     broken (cts_defaults/mts-*/vts-*/llvm_tblgen/rs_defaults), lalu rename
#     file Android.bp tsb ke .bp.disabled. Soong skip directory tanpa Android.bp.
#     Camera HAL Android.bp tetap dipertahankan (eksplisit di-skip).
#
# Perubahan v9.6 vs v9.5:
#   - Prune RenderScript chain (mclinker, slang, libbcc, frameworks/rs)
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      aosp_branch:
        description: 'AOSP branch (rec: android16-qpr2-release)'
        required: true
        default: 'android16-qpr2-release'
      build_variant:
        description: 'lunch target'
        required: true
        default: 'aosp_arm64-trunk_staging-userdebug'

jobs:
  build:
    name: Build External Camera HAL
    runs-on: ubuntu-22.04
    timeout-minutes: 350

    env:
      TMPDIR: /mnt/aosp/tmpdir
      TMP: /mnt/aosp/tmpdir
      TEMP: /mnt/aosp/tmpdir

    steps:
      # ---------- Step 1a: Aggressive cleanup ----------
      - name: Free disk (aggressive)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Disk after jlumbroso cleanup
        run: df -h

      # ---------- Step 1b: Allocate big LVM at /mnt/aosp ----------
      - name: Maximize build space (LVM)
        uses: easimon/maximize-build-space@v10
        with:
          root-reserve-mb: 8192
          swap-size-mb: 16384
          remove-dotnet: 'false'
          remove-android: 'false'
          remove-haskell: 'false'
          remove-codeql: 'true'
          remove-docker-images: 'false'
          build-mount-path: '/mnt/aosp'

      - name: Disk after easimon LVM
        run: |
          df -h
          free -h

      # ---------- Step 2: Symlink /tmp & /var/tmp ke /mnt/aosp ----------
      - name: Replace /tmp & /var/tmp with symlinks to /mnt/aosp
        run: |
          sudo mkdir -p /mnt/aosp/tmpdir /mnt/aosp/vartmp /mnt/aosp/aptcache
          sudo chmod 1777 /mnt/aosp/tmpdir /mnt/aosp/vartmp

          echo "=== Sebelum aggressive cleanup ==="
          df -h /
          sudo rm -rf \
            /usr/share/swift \
            /opt/hostedtoolcache/PyPy \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/go \
            /opt/hostedtoolcache/node \
            /opt/google /opt/microsoft \
            /usr/local/.ghcup \
            /usr/local/share/powershell \
            /usr/local/share/chromium \
            /usr/local/lib/node_modules \
            /var/cache/snapd \
            /var/cache/man \
            /usr/lib/firefox \
            /usr/lib/google-cloud-sdk \
            /usr/lib/jvm/temurin-8* \
            /usr/lib/jvm/temurin-11* \
            2>/dev/null || true
          echo "=== Setelah aggressive cleanup ==="
          df -h /

          sudo systemctl stop snapd.service snapd.socket 2>/dev/null || true
          sudo rm -rf /tmp.old /var/tmp.old 2>/dev/null || true
          sudo mv /tmp /tmp.old
          sudo mv /var/tmp /var/tmp.old
          sudo ln -s /mnt/aosp/tmpdir /tmp
          sudo ln -s /mnt/aosp/vartmp /var/tmp
          sudo rm -rf /var/cache/apt/archives
          sudo ln -s /mnt/aosp/aptcache /var/cache/apt/archives

          echo "=== Verifikasi symlinks ==="
          ls -la /tmp /var/tmp /var/cache/apt/archives
          echo "test" > /tmp/test.txt && cat /tmp/test.txt && rm /tmp/test.txt
          echo "Symlink target /tmp -> $(readlink -f /tmp)"
          echo "Symlink target /var/tmp -> $(readlink -f /var/tmp)"
          df -h /tmp /var/tmp
          df -i /mnt/aosp /

      # ---------- Step 3: Install build deps ----------
      - name: Install AOSP build deps
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            git-core gnupg flex bison build-essential zip curl zlib1g-dev \
            libc6-dev-i386 libncurses-dev x11proto-core-dev libx11-dev \
            lib32z1-dev libgl1-mesa-dev libxml2-utils xsltproc unzip \
            fontconfig openjdk-17-jdk python3 python3-pip ccache rsync \
            libssl-dev bc cpio kmod
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo chown -R $USER:$USER /mnt/aosp

      - name: Disk after install
        run: df -h

      # ---------- Step 4: Setup HOME & repo tool ----------
      - name: Setup HOME & repo tool
        run: |
          mkdir -p /mnt/aosp/home
          echo "HOME=/mnt/aosp/home" >> $GITHUB_ENV

          mkdir -p /mnt/aosp/bin
          curl -s https://storage.googleapis.com/git-repo-downloads/repo > /mnt/aosp/bin/repo
          chmod a+x /mnt/aosp/bin/repo
          echo "/mnt/aosp/bin" >> $GITHUB_PATH

          HOME=/mnt/aosp/home git config --global user.email "santuyajah6@gmail.com"
          HOME=/mnt/aosp/home git config --global user.name "Santuyajah"
          HOME=/mnt/aosp/home git config --global color.ui false
          HOME=/mnt/aosp/home git config --global pack.threads 2

      # ---------- Step 5: Repo init (v9.2: no -g filter, terbukti perlu di android16) ----------
      - name: Repo init (no group filter)
        working-directory: /mnt/aosp
        run: |
          # v9.2 KEY FINDING (dari run v9.1):
          #   -g default        -> 22 projects (FAIL: hardware/interfaces missing)
          #   -g all,-notdefault -> 22 projects (FAIL: SAMA SEPERTI default)
          #   tanpa -g          -> 1010 projects (OK: hardware/interfaces ADA)
          # Kesimpulan: di branch android16-qpr2-release, sistem group sudah
          # berbeda total. Bahkan tag "all" tidak match. Solusi: skip -g.
          # Trade-off: sync lebih besar (~30-50GB extra). Kompensasi via
          # aggressive rm -rf post-sync (Step 8).
          /mnt/aosp/bin/repo init \
            -u https://android.googlesource.com/platform/manifest \
            -b ${{ github.event.inputs.aosp_branch }} \
            --depth=1 --no-tags --no-clone-bundle

      # ---------- Step 6: Local manifest (v9.3: AGGRESSIVE prune ~60GB) ----------
      # v9.3 KEY FIX:
      #   v9.1 sync gagal: "No space left on device" di /mnt/aosp (101G full)
      #   Tanpa -g filter, sync ~99GB. Build perlu 50GB + ccache 8GB = total ~157GB.
      #   GHA max 101GB -> kurang ~56GB. Harus prune ~60GB di sync time.
      # 
      # Strategy: pakai optional="true" (terbukti aman di v9.1) untuk SEMUA
      # remove. Kalau project tidak ada di manifest, repo skip diam-diam.
      # 
      # JANGAN PRUNE (deps camera HAL — confirmed dari Android.bp):
      #   - system/core, system/libhidl, system/libfmq, system/libbase
      #   - frameworks/av, frameworks/native (CameraMetadata, gralloc)
      #   - hardware/libhardware (gralloc HAL header)
      #   - hardware/interfaces (TARGET kita!)
      #   - external/jpeg-turbo, external/libyuv, external/tinyxml2,
      #     external/libexif, external/expat
      #   - bionic, prebuilts/clang, prebuilts/build-tools, build/*
      #   - kernel/configs (untuk vintf check)
      - name: Apply aggressive prune local manifest
        working-directory: /mnt/aosp
        run: |
          mkdir -p .repo/local_manifests
          cat > .repo/local_manifests/skip_safe.xml << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
            <!-- ===== TIER 1: Test suites (~5GB) — confirmed v7 sukses ===== -->
            <remove-project name="platform/cts" optional="true"/>
            <remove-project name="platform/test/cts-root" optional="true"/>
            <remove-project name="platform/test/mts" optional="true"/>
            <remove-project name="platform/test/graphics" optional="true"/>
            <remove-project name="platform/test/vts" optional="true"/>
            <remove-project name="platform/test/vts-testcase" optional="true"/>
            <remove-project name="platform/test/dittosuite" optional="true"/>
            <remove-project name="platform/test/app_compat" optional="true"/>
            <remove-project name="platform/test/suite_harness" optional="true"/>

            <!-- ===== TIER 2: Toolchain source / alternative langs (~14GB) ===== -->
            <!-- Kita pakai PREBUILT clang, jadi LLVM/Rust/V8 SOURCE tidak perlu -->
            <remove-project name="platform/external/llvm-project" optional="true"/>
            <remove-project name="platform/external/llvm" optional="true"/>
            <remove-project name="platform/external/clang" optional="true"/>
            <remove-project name="platform/external/lldb-llvm" optional="true"/>
            <remove-project name="platform/prebuilts/rust" optional="true"/>
            <remove-project name="platform/prebuilts/v8" optional="true"/>
            <remove-project name="platform/external/v8" optional="true"/>
            <remove-project name="platform/external/swift" optional="true"/>
            <remove-project name="platform/external/dart" optional="true"/>

            <!-- ===== TIER 3: VNDK — KEEP ALL (v9.5 lesson learned) ===== -->
            <!-- v9.4 FIX KEMBALIKAN v31 -> error "VNDK 32 not found"
                 v9.5 LESSON: lunch target cek SEMUA VNDK versions di
                   PRODUCT_EXTRA_VNDK_VERSIONS=[30,31,32,33,34,35]
                 Kalau salah satu missing, fail. Solusi: KEEP ALL VNDK.
                 Total cost: ~15GB. Kompensasi via darwin prune + disable ccache. -->
            <!-- KEEP: platform/prebuilts/vndk/v30 sd v35 -->
            <remove-project name="platform/prebuilts/abi-dumps" optional="true"/>
            <remove-project name="platform/prebuilts/abi-dumps/ndk" optional="true"/>
            <remove-project name="platform/prebuilts/abi-dumps/platform" optional="true"/>
            <remove-project name="platform/prebuilts/abi-dumps/vndk" optional="true"/>

            <!-- ===== TIER 4: Browser & web (~7GB) — irrelevant untuk HAL ===== -->
            <remove-project name="platform/external/chromium-webview" optional="true"/>
            <remove-project name="platform/external/chromium-libpac" optional="true"/>
            <remove-project name="platform/external/cronet" optional="true"/>

            <!-- ===== TIER 5: Build/SDK extras (~8GB) ===== -->
            <remove-project name="platform/prebuilts/fuchsia_sdk" optional="true"/>
            <remove-project name="platform/prebuilts/qemu-kernel" optional="true"/>
            <remove-project name="platform/prebuilts/maven_repo/android" optional="true"/>
            <remove-project name="platform/prebuilts/maven_repo/bumblebee" optional="true"/>
            <remove-project name="platform/prebuilts/cmake" optional="true"/>
            <remove-project name="platform/prebuilts/cmake-linux" optional="true"/>
            <remove-project name="platform/prebuilts/cmake-darwin" optional="true"/>
            <remove-project name="platform/prebuilts/ndk" optional="true"/>
            <remove-project name="platform/prebuilts/sdk" optional="true"/>
            <remove-project name="platform/prebuilts/runtime" optional="true"/>
            <remove-project name="platform/prebuilts/asuite" optional="true"/>

            <!-- ===== TIER 6: Apps tidak relevan (~5GB) ===== -->
            <remove-project name="platform/packages/apps/Chrome" optional="true"/>
            <remove-project name="platform/packages/apps/Browser2" optional="true"/>
            <remove-project name="platform/packages/apps/Bluetooth" optional="true"/>
            <remove-project name="platform/packages/apps/EmergencyInfo" optional="true"/>
            <remove-project name="platform/packages/apps/Gallery2" optional="true"/>
            <remove-project name="platform/packages/apps/Music" optional="true"/>
            <remove-project name="platform/packages/apps/Calendar" optional="true"/>
            <remove-project name="platform/packages/apps/DeskClock" optional="true"/>
            <remove-project name="platform/packages/apps/Email" optional="true"/>
            <remove-project name="platform/packages/apps/Messaging" optional="true"/>

            <!-- ===== TIER 7: Misc (~6GB) ===== -->
            <remove-project name="platform/developers/build" optional="true"/>
            <remove-project name="platform/developers/demos" optional="true"/>
            <remove-project name="platform/developers/samples" optional="true"/>
            <remove-project name="platform/developers/docs" optional="true"/>
            <remove-project name="platform/developers/samples/android" optional="true"/>
            <remove-project name="platform/docs/source.android.com" optional="true"/>
            <remove-project name="platform/external/perfetto" optional="true"/>
            <remove-project name="platform/external/skia" optional="true"/>
            <remove-project name="platform/external/skqp" optional="true"/>
            <remove-project name="platform/frameworks/wilhelm" optional="true"/>
            <remove-project name="platform/frameworks/opt/photoviewer" optional="true"/>

            <!-- ===== TIER 8 (v9.5): Extra prune ~10GB untuk kompensasi VNDK kembali ===== -->
            <!-- Darwin prebuilts: kita build di linux-x86_64, darwin tidak dipakai -->
            <remove-project name="platform/prebuilts/clang-darwin" optional="true"/>
            <remove-project name="platform/prebuilts/build-tools-darwin" optional="true"/>
            <remove-project name="platform/prebuilts/python-darwin" optional="true"/>
            <remove-project name="platform/prebuilts/go/darwin-x86" optional="true"/>
            <!-- Kernel binaries: kita tidak build kernel di sini, kernel sudah ada di HP -->
            <remove-project name="platform/prebuilts/kernel/x86_64" optional="true"/>
            <remove-project name="platform/prebuilts/kernel/arm64" optional="true"/>
            <!-- Extra apps non-essential -->
            <remove-project name="platform/packages/apps/Contacts" optional="true"/>
            <remove-project name="platform/packages/apps/Dialer" optional="true"/>
            <remove-project name="platform/packages/apps/TV" optional="true"/>
            <remove-project name="platform/packages/apps/CarrierConfig" optional="true"/>
            <remove-project name="platform/packages/apps/UniversalMediaPlayer" optional="true"/>
            <remove-project name="platform/packages/apps/Settings" optional="true"/>
            <remove-project name="platform/packages/apps/SystemUI" optional="true"/>
            <remove-project name="platform/packages/apps/Launcher3" optional="true"/>
            <!-- Extra non-essential externals (verified safe for camera HAL):
                 NOTE: TIDAK PRUNE icu/boringssl/conscrypt — transitive deps via libbase -->
            <remove-project name="platform/external/grpc-grpc" optional="true"/>
            <remove-project name="platform/external/grpc-grpc-java" optional="true"/>
            <remove-project name="platform/external/tensorflow" optional="true"/>
            <remove-project name="platform/external/sonivox" optional="true"/>

            <!-- ===== TIER 9 (v9.6): RenderScript compiler chain ~5GB ===== -->
            <!-- Error v9.5 di soong bootstrap:
                   frameworks/compile/mclinker/tools/mcld/Android.bp:29:1:
                     unrecognized module type "llvm_tblgen"
                   frameworks/compile/slang/Android.bp:158:1: unrecognized module type "llvm_tblgen"
                 Sebab: llvm_tblgen didefinisikan di external/llvm-project yang kita prune.
                 Solusi: prune juga mclinker + slang yang reference module type tsb.
                 Camera HAL TIDAK pakai RenderScript chain ini. -->
            <remove-project name="platform/frameworks/compile/mclinker" optional="true"/>
            <remove-project name="platform/frameworks/compile/slang" optional="true"/>
            <remove-project name="platform/frameworks/compile/libbcc" optional="true"/>
            <remove-project name="platform/frameworks/rs" optional="true"/>
          </manifest>
          EOF
          echo "=== Local manifest content ==="
          cat .repo/local_manifests/skip_safe.xml
          echo ""
          echo "=== Total remove-project entries ==="
          grep -c '<remove-project' .repo/local_manifests/skip_safe.xml

      # ---------- Step 6b: Pre-sync manifest validation (v9.3: cek prune efektif) ----------
      - name: Pre-sync manifest validation
        working-directory: /mnt/aosp
        run: |
          mkdir -p /mnt/aosp/logs
          echo "=== Dump manifest ==="
          /mnt/aosp/bin/repo manifest -o /mnt/aosp/logs/manifest_dump.xml
          SIZE=$(stat -c%s /mnt/aosp/logs/manifest_dump.xml)
          echo "manifest_dump.xml size: ${SIZE} bytes"
          
          if [ "$SIZE" -lt 50000 ]; then
            echo "WARNING: manifest size suspiciously small (${SIZE} bytes)"
            echo "Expected: ~80000-99000 bytes after prune"
          fi
          
          echo ""
          echo "=== Cek apakah platform/hardware/interfaces ada di manifest ==="
          if grep -q 'name="platform/hardware/interfaces"' /mnt/aosp/logs/manifest_dump.xml; then
            echo "OK: platform/hardware/interfaces TERMASUK"
          else
            echo "FATAL: platform/hardware/interfaces TIDAK ADA"
            echo "=== List semua project (sample 100) ==="
            grep -oE 'name="[^"]+"' /mnt/aosp/logs/manifest_dump.xml | head -100
            exit 1
          fi
          
          echo ""
          echo "=== Verifikasi project KRITIS (deps camera HAL) masih ADA ==="
          CRITICAL_DEPS="platform/system/core platform/system/libhidl platform/system/libfmq platform/system/libbase platform/frameworks/av platform/frameworks/native platform/hardware/libhardware platform/external/jpeg-turbo platform/external/libyuv platform/external/tinyxml2 platform/bionic platform/build platform/build_bazel"
          MISSING_CRITICAL=0
          for dep in $CRITICAL_DEPS; do
            if grep -q "name=\"$dep\"" /mnt/aosp/logs/manifest_dump.xml; then
              echo "  OK: $dep"
            else
              echo "  WARN: $dep TIDAK ADA (mungkin di-rename, akan cek post-sync)"
              MISSING_CRITICAL=$((MISSING_CRITICAL+1))
            fi
          done
          
          echo ""
          echo "=== Verifikasi project yang HARUS DI-PRUNE benar-benar ter-prune ==="
          PRUNED_TARGETS="platform/prebuilts/rust platform/external/llvm-project platform/external/chromium-webview platform/prebuilts/abi-dumps platform/prebuilts/clang-darwin"
          for tgt in $PRUNED_TARGETS; do
            if grep -q "name=\"$tgt\"" /mnt/aosp/logs/manifest_dump.xml; then
              echo "  WARN: $tgt MASIH ADA (prune tidak match nama project)"
            else
              echo "  OK: $tgt PRUNED"
            fi
          done

          echo ""
          echo "=== Verifikasi VNDK v30-v35 SEMUANYA dipertahankan (v9.5 fix) ==="
          for v in 30 31 32 33 34 35; do
            if grep -q "name=\"platform/prebuilts/vndk/v${v}\"" /mnt/aosp/logs/manifest_dump.xml; then
              echo "  OK: vndk/v${v} TERMASUK"
            else
              echo "  WARN: vndk/v${v} TIDAK ADA (mungkin di-rename, akan cek post-sync)"
            fi
          done
          
          echo ""
          echo "=== List semua project hardware/* di manifest ==="
          grep -oE 'name="platform/hardware/[^"]+"' /mnt/aosp/logs/manifest_dump.xml | sort -u | head -50
          
          echo ""
          echo "=== Total project di manifest ==="
          PROJ_COUNT=$(grep -c '<project ' /mnt/aosp/logs/manifest_dump.xml || echo 0)
          echo "Total: $PROJ_COUNT projects"
          if [ "$PROJ_COUNT" -lt 100 ]; then
            echo "FATAL: project count terlalu sedikit ($PROJ_COUNT). Expected: ~900+"
            exit 1
          fi
          if [ "$PROJ_COUNT" -gt 1100 ]; then
            echo "WARN: project count > 1100 ($PROJ_COUNT). Prune mungkin tidak efektif."
            echo "      Expected setelah prune ~60GB: ~900-960 projects."
          fi
          echo "PASSED: manifest validation OK"

      # ---------- Step 7a: Memory monitor ----------
      - name: Start memory monitor
        run: |
          mkdir -p /mnt/aosp/logs
          (while true; do
             echo "[$(date +%H:%M:%S)] MEM: $(free -m | grep '^Mem' | awk '{print "used="$3"M free="$4"M avail="$7"M"}') | DISK_root=$(df -BM / | tail -1 | awk '{print $4}') DISK_aosp=$(df -BM /mnt/aosp | tail -1 | awk '{print $4}')" >> /mnt/aosp/logs/monitor.log
             sleep 30
           done) &
          echo $! > /mnt/aosp/logs/monitor.pid

      # ---------- Step 7b: Repo sync (--fail-fast) ----------
      - name: Repo sync (with retry & fail-fast)
        working-directory: /mnt/aosp
        run: |
          set +e
          MAX_RETRY=3
          for i in $(seq 1 $MAX_RETRY); do
            echo "===== Sync attempt $i / $MAX_RETRY ====="
            df -h | head -4
            FREE_AOSP_GB=$(df -BG /mnt/aosp | tail -1 | awk '{print $4}' | tr -d 'G')
            echo "Free di /mnt/aosp sebelum sync: ${FREE_AOSP_GB}G"
            if [ "$FREE_AOSP_GB" -lt 50 ]; then
              echo "WARNING: Free space < 50G, sync mungkin gagal"
            fi
            /mnt/aosp/bin/repo sync \
              -c -j2 --force-sync --no-clone-bundle \
              --no-tags --optimized-fetch --fail-fast
            RC=$?
            if [ $RC -eq 0 ]; then
              echo "===== Sync sukses di attempt $i ====="
              df -h /mnt/aosp
              exit 0
            fi
            echo "===== Sync gagal (exit $RC), tunggu 60s lalu retry ====="
            df -h
            sleep 60
            sync && echo 3 | sudo tee /proc/sys/vm/drop_caches >/dev/null || true
          done
          echo "===== Sync gagal setelah $MAX_RETRY attempts ====="
          exit 1

      - name: Stop memory monitor
        if: always()
        run: |
          if [ -f /mnt/aosp/logs/monitor.pid ]; then
            kill $(cat /mnt/aosp/logs/monitor.pid) 2>/dev/null || true
          fi
          echo "=== Monitor log tail (last 80 lines) ==="
          tail -80 /mnt/aosp/logs/monitor.log || true

      - name: Disk after sync
        if: always()
        run: df -h

      # ---------- Step 8: Post-sync cleanup (v9.1: aggressive size cap) ----------
      # v9.1: pindah size cap ke sini, dari local_manifest yang error-prone.
      # rm -rf aman: kalau folder tidak ada, skip diam-diam.
      - name: Post-sync cleanup (aggressive size cap)
        working-directory: /mnt/aosp
        run: |
          echo "=== Sebelum cleanup ==="
          du -sh . 2>/dev/null | tail -1
          df -h /mnt/aosp
          for d in \
            external/chromium-webview \
            external/cronet \
            external/llvm-project \
            external/llvm \
            external/clang \
            kernel/common \
            kernel/common-modules \
            prebuilts/abi-dumps \
            prebuilts/fuchsia_sdk \
            prebuilts/qemu-kernel \
            prebuilts/cmake \
            prebuilts/ndk \
            prebuilts/maven_repo \
            prebuilts/sdk \
            developers \
            docs \
            cts \
            test/cts-root \
            test/mts \
            test/graphics ; do
            if [ -e "$d" ]; then
              SIZE=$(du -sh "$d" 2>/dev/null | cut -f1)
              rm -rf "$d" && echo "Removed $d (was $SIZE)"
            fi
          done
          echo "=== Setelah cleanup ==="
          du -sh . 2>/dev/null | tail -1
          df -h /mnt/aosp

      # ---------- Step 8a (NEW v9.7): Strip Android.bp dengan reference broken ----------
      # Strategi:
      #   Daripada whack-a-mole prune project per project, scan semua Android.bp
      #   yang masih reference simbol yang sudah hilang (cts_defaults,
      #   mts-target-sdk-version-current, llvm_tblgen, dll), lalu HAPUS file
      #   Android.bp tersebut. Project-nya tetap ada, hanya build manifest
      #   untuk file tersebut yang dihilangkan.
      # 
      #   Camera HAL TIDAK butuh modul test/CTS/MTS apapun. Aman.
      # 
      # Symbol yang dihapus (terkait test yang sudah di-prune):
      #   - cts_defaults              (dari platform/cts)
      #   - mts_defaults / mts-*      (dari platform/test/mts)
      #   - vts_defaults / vts-*      (dari platform/test/vts)
      #   - llvm_tblgen / llvm_*      (dari platform/external/llvm-project)
      #   - rs_defaults               (dari platform/frameworks/rs)
      - name: Strip broken Android.bp (reference pruned modules)
        working-directory: /mnt/aosp
        run: |
          echo "=== Scanning Android.bp dengan reference broken modules ==="
          # Pattern broken: simbol yang dipakai di defaults / dependencies
          PATTERNS='"cts_defaults"|"mts_defaults"|"mts-target-sdk-version-current"|"vts_defaults"|"llvm_tblgen"|"rs_defaults"|"cts-tradefed"|"vts-tradefed"|"mts-tradefed"'

          # Cari Android.bp yang match pattern tsb
          # Skip hardware/interfaces/camera/* — itu target build kita!
          BROKEN_FILES=$(grep -rlE "$PATTERNS" --include="Android.bp" \
            --exclude-dir=".repo" \
            --exclude-dir="hardware/interfaces/camera" \
            . 2>/dev/null || true)

          COUNT=$(echo "$BROKEN_FILES" | grep -c '.' || echo 0)
          echo "Total Android.bp dengan reference broken: $COUNT"

          if [ -z "$BROKEN_FILES" ] || [ "$COUNT" -eq 0 ]; then
            echo "Tidak ada file Android.bp broken — skip strip"
            exit 0
          fi

          echo ""
          echo "=== Daftar Android.bp yang akan di-strip (sample 30) ==="
          echo "$BROKEN_FILES" | head -30
          echo "..."

          echo ""
          echo "=== Stripping (rename ke .bp.disabled supaya soong skip) ==="
          STRIPPED=0
          for f in $BROKEN_FILES; do
            # Safety: pastikan file ini bukan deps camera HAL
            if echo "$f" | grep -qE "hardware/interfaces/camera|hardware/libhardware/include/hardware/camera"; then
              echo "  SKIP (camera HAL deps): $f"
              continue
            fi
            mv "$f" "${f}.disabled"
            STRIPPED=$((STRIPPED+1))
          done
          echo ""
          echo "Total stripped: $STRIPPED"
          echo "(Soong akan skip directory tanpa Android.bp)"

          echo ""
          echo "=== Konfirmasi camera HAL Android.bp masih ada ==="
          ls -la hardware/interfaces/camera/provider/default/Android.bp
          ls -la hardware/interfaces/camera/device/default/Android.bp

      # ---------- Step 8b: Diagnose hardware tree ----------
      - name: Diagnose hardware tree (BEFORE Verify)
        working-directory: /mnt/aosp
        run: |
          echo "============================================================"
          echo " DIAGNOSTIC: Hardware Tree State After Sync"
          echo "============================================================"

          echo ""
          echo "--- 1. /mnt/aosp top level ---"
          ls /mnt/aosp 2>&1 | head -50

          echo ""
          echo "--- 2. /mnt/aosp/hardware ---"
          ls /mnt/aosp/hardware 2>&1 | head -50 || echo "MISSING: /mnt/aosp/hardware"

          echo ""
          echo "--- 3. /mnt/aosp/hardware/interfaces ---"
          ls /mnt/aosp/hardware/interfaces 2>&1 | head -50 || echo "MISSING: hardware/interfaces"

          echo ""
          echo "--- 4. /mnt/aosp/hardware/interfaces/camera ---"
          ls /mnt/aosp/hardware/interfaces/camera 2>&1 | head -50 || echo "MISSING: hardware/interfaces/camera"

          echo ""
          echo "--- 5. /mnt/aosp/hardware/interfaces/camera/provider ---"
          ls /mnt/aosp/hardware/interfaces/camera/provider 2>&1 | head -50 || echo "MISSING: camera/provider"

          echo ""
          echo "--- 6. /mnt/aosp/hardware/interfaces/camera/device ---"
          ls /mnt/aosp/hardware/interfaces/camera/device 2>&1 | head -50 || echo "MISSING: camera/device"

          echo ""
          echo "--- 7. find: semua folder bernama 'camera' (depth<=4) ---"
          find /mnt/aosp -maxdepth 4 -type d -name "camera" 2>/dev/null | head -30

          echo ""
          echo "--- 8. find: ExternalCameraProvider.cpp di mana saja ---"
          find /mnt/aosp -name "ExternalCameraProvider.cpp" 2>/dev/null | head -10

          echo ""
          echo "--- 9. find: ExternalCameraDevice.cpp di mana saja ---"
          find /mnt/aosp -name "ExternalCameraDevice.cpp" 2>/dev/null | head -10

          echo ""
          echo "--- 10. find: file Android.bp di tree camera (depth<=6) ---"
          find /mnt/aosp/hardware/interfaces/camera -maxdepth 6 -name "Android.bp" 2>/dev/null | head -20 || true

          echo ""
          echo "--- 11. repo project list (filtered: hardware) ---"
          /mnt/aosp/bin/repo list 2>/dev/null | grep -E "hardware|HARDWARE" | tee /mnt/aosp/logs/repo_list_hardware.txt | head -50 || true

          echo ""
          echo "--- 12. repo list TOTAL ---"
          /mnt/aosp/bin/repo list 2>/dev/null | tee /mnt/aosp/logs/repo_list.txt | wc -l
          echo "Total project count above"

          echo ""
          echo "--- 13. Cek status sync untuk hardware/interfaces ---"
          if [ -d /mnt/aosp/hardware/interfaces ]; then
            cd /mnt/aosp/hardware/interfaces
            echo "git status:"
            git status 2>&1 | head -10 || true
            echo "git log -1:"
            git log -1 --oneline 2>&1 || true
            cd /mnt/aosp
          else
            echo "/mnt/aosp/hardware/interfaces TIDAK ADA — sync gagal silent"
          fi

          echo ""
          echo "============================================================"
          echo " END DIAGNOSTIC"
          echo "============================================================"

      # ---------- Step 8c: Auto-recover hardware/interfaces kalau missing ----------
      - name: Auto-recover hardware/interfaces (if missing)
        working-directory: /mnt/aosp
        run: |
          if [ ! -d /mnt/aosp/hardware/interfaces/camera/provider/default ]; then
            echo "=== Folder target missing — coba force-sync platform/hardware/interfaces saja ==="
            /mnt/aosp/bin/repo sync \
              -c -j2 --force-sync --no-clone-bundle \
              --no-tags --optimized-fetch \
              platform/hardware/interfaces || true
            echo ""
            echo "=== Setelah recovery sync ==="
            ls /mnt/aosp/hardware/interfaces/camera/provider/ 2>&1 | head -20
            ls /mnt/aosp/hardware/interfaces/camera/device/ 2>&1 | head -20
          else
            echo "=== Folder target ADA, skip auto-recovery ==="
          fi

      # ---------- Step 8d: Upload diagnostic artifacts SEBELUM verify ----------
      - name: Upload diagnostic artifacts (pre-verify)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-pre-verify
          path: |
            /mnt/aosp/logs/manifest_dump.xml
            /mnt/aosp/logs/repo_list.txt
            /mnt/aosp/logs/repo_list_hardware.txt
            /mnt/aosp/logs/monitor.log
          retention-days: 14
          if-no-files-found: warn

      # ---------- Step 8e: Verify ----------
      - name: Verify external camera HAL source
        working-directory: /mnt/aosp
        run: |
          MISSING=0
          echo "=== camera/provider/default/ ==="
          if ls -la hardware/interfaces/camera/provider/default/ 2>/dev/null | head -30; then
            echo "OK: provider/default/ ADA"
          else
            echo "FATAL: hardware/interfaces/camera/provider/default/ TIDAK ADA"
            MISSING=1
          fi
          echo ""
          echo "=== camera/device/default/ ==="
          if ls -la hardware/interfaces/camera/device/default/ 2>/dev/null | head -30; then
            echo "OK: device/default/ ADA"
          else
            echo "FATAL: hardware/interfaces/camera/device/default/ TIDAK ADA"
            MISSING=1
          fi
          echo ""
          echo "=== File-file kunci ==="
          for f in \
            hardware/interfaces/camera/provider/default/ExternalCameraProvider.cpp \
            hardware/interfaces/camera/device/default/ExternalCameraDevice.cpp ; do
            if [ -f "$f" ]; then
              echo "OK: $f"
            else
              echo "MISSING: $f"
              MISSING=1
            fi
          done

          if [ $MISSING -ne 0 ]; then
            echo ""
            echo "=========================================================="
            echo " VERIFY GAGAL — cek artifact 'diagnostic-pre-verify'"
            echo " untuk manifest_dump.xml + repo_list_hardware.txt"
            echo "=========================================================="
            exit 1
          fi
          echo ""
          echo "=== Verify SUKSES ==="

      # ---------- Step 9: Build (v9.5: ccache disabled untuk hemat 8GB) ----------
      - name: Build external camera HAL
        working-directory: /mnt/aosp
        run: |
          set -e
          set -o pipefail
          source build/envsetup.sh
          lunch ${{ github.event.inputs.build_variant }}
          # v9.5: ccache DISABLED untuk hemat 8GB disk
          # Trade-off: build pertama lebih lambat (~2.5 jam vs ~2 jam)
          # tapi free 8GB extra space untuk out/ artifact
          export USE_CCACHE=0
          # Free space monitoring
          echo "=== Disk before build ==="
          df -h /mnt/aosp

          m -j$(nproc) \
            android.hardware.camera.provider-V1-external-service \
            android.hardware.camera.provider-V1-external-impl \
            camera.device-external-impl \
            2>&1 | tee /mnt/aosp/build.log

          echo "=== Disk after build ==="
          df -h /mnt/aosp

      # ---------- Step 10: Collect ----------
      - name: Collect artifacts
        working-directory: /mnt/aosp
        run: |
          mkdir -p $GITHUB_WORKSPACE/artifacts/vendor/bin/hw
          mkdir -p $GITHUB_WORKSPACE/artifacts/vendor/lib64/hw
          mkdir -p $GITHUB_WORKSPACE/artifacts/vendor/etc/init
          mkdir -p $GITHUB_WORKSPACE/artifacts/source_reference

          find out -type f -name "android.hardware.camera.provider-V1-external-service" \
            -not -path "*/symbols/*" -not -path "*/unstripped/*" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/vendor/bin/hw/ \;

          find out -type f -name "android.hardware.camera.provider-V1-external-impl.so" \
            -not -path "*/symbols/*" -not -path "*/unstripped/*" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/vendor/lib64/hw/ \;

          find out -type f -name "camera.device-external-impl.so" \
            -not -path "*/symbols/*" -not -path "*/unstripped/*" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/vendor/lib64/hw/ \;

          find out -type f -name "android.hardware.camera.provider-V1-external-service*.rc" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/vendor/etc/init/ \; 2>/dev/null || true

          cp -v hardware/interfaces/camera/provider/default/Android.bp \
            $GITHUB_WORKSPACE/artifacts/source_reference/provider_Android.bp 2>/dev/null || true
          cp -v hardware/interfaces/camera/device/default/Android.bp \
            $GITHUB_WORKSPACE/artifacts/source_reference/device_Android.bp 2>/dev/null || true
          cp -v hardware/interfaces/camera/provider/default/*.rc \
            $GITHUB_WORKSPACE/artifacts/source_reference/ 2>/dev/null || true

          find . -type f \( -name "hal_camera*.te" -o -name "*camera_external*.te" \) \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/source_reference/ \; 2>/dev/null || true
          find . -type f -name "*camera*external*manifest*.xml" \
            -exec cp -v {} $GITHUB_WORKSPACE/artifacts/source_reference/ \; 2>/dev/null || true

      - name: Show final artifacts
        run: |
          find $GITHUB_WORKSPACE/artifacts -type f -exec ls -la {} \;
          du -sh $GITHUB_WORKSPACE/artifacts/

      # ---------- Step 11: Upload ----------
      - name: Upload HAL artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: external-camera-hal-arm64
          path: artifacts/
          retention-days: 30
          if-no-files-found: error

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /mnt/aosp/build.log
          retention-days: 14
          if-no-files-found: ignore

      - name: Upload monitor logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitor-logs
          path: /mnt/aosp/logs/
          retention-days: 14
          if-no-files-found: ignore
